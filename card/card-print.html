<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{ --navy:#0F2D69; }
  @page{ size:96mm 56mm; margin:0; }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  html,body{ font-family:"Inter",system-ui,sans-serif; color:var(--navy); }

  .card{ width:96mm; height:56mm; background:#fff; position:relative;
    padding:8mm; page-break-after:always; overflow:hidden; }
  .card:last-child{ page-break-after:auto; }

  /* ---- FRONT ---- */
  .front{ display:flex; align-items:center; justify-content:space-between; gap:6mm; }
  .name{ font-size:12.5pt; font-weight:600; letter-spacing:-.01em; line-height:1.1; }
  .role{ font-size:7pt; font-weight:500; margin-top:1.2mm; }
  .accent-rule{ width:12mm; height:.7mm; background:var(--navy); border-radius:1mm; margin:2.8mm 0 3.2mm; }
  .contact{ display:flex; align-items:center; gap:2mm; font-size:7pt; margin-bottom:1.8mm; }
  .contact svg{ width:3.1mm; height:3.1mm; flex:0 0 auto; }
  .qr img{ width:24mm; height:24mm; display:block; flex:0 0 auto; }

  /* ---- BACK ---- */
  .back{ display:flex; align-items:center; justify-content:center; }
  .piefs{ font-size:22pt; font-weight:600; letter-spacing:.06em; }
</style>
</head>
<body>

  <!-- FRONT -->
  <div class="card front">
    <div class="info">
      <div class="name">Varvara Nazarenko</div>
      <div class="role" style="margin-bottom:3.4mm">ML researcher</div>
      <div class="contact">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 6 10-6"/></svg>
        varunaza@gmail.com
      </div>
      <div class="contact">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.94 4.5 18.9 19.14c-.23 1.01-.83 1.26-1.68.78l-4.64-3.42-2.24 2.15c-.25.25-.46.46-.94.46l.33-4.72L18.4 6.4c.37-.33-.08-.51-.58-.18L7.24 13.1l-4.56-1.43c-.99-.31-1.01-.99.21-1.47l17.83-6.87c.82-.31 1.54.19 1.22 1.17z"/></svg>
        t.me/fletchik
      </div>
      <div class="contact">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.35V9h3.42v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.06 2.06 0 1 1 0-4.13 2.06 2.06 0 0 1 0 4.13zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.8 0 0 .78 0 1.75v20.5C0 23.22.8 24 1.77 24h20.45c.98 0 1.78-.78 1.78-1.75V1.75C24 .78 23.2 0 22.22 0z"/></svg>
        linkedin.com/in/varuuu
      </div>
    </div>
    <div class="qr">
      <img src="qr.png" alt="QR to fletchik.github.io" />
    </div>
  </div>

  <!-- BACK -->
  <div class="card back">
    <div class="piefs">PIEFS</div>
  </div>

</body>
</html>
